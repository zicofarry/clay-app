# ─────────────────────────────────────────────────────────────────────────────
# Clay Platform — Kubernetes Service Manifests
# Each microservice: Deployment + Service
# Pattern: 1 replica (scale up as needed), ClusterIP service
# ─────────────────────────────────────────────────────────────────────────────

# ─── Auth Service ─────────────────────────────────────────────────────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clay-auth-service
  namespace: clay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clay-auth-service
  template:
    metadata:
      labels:
        app: clay-auth-service
    spec:
      containers:
        - name: clay-auth-service
          image: clay/clay-auth-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: DB_HOST
              value: postgres-auth
            - name: DB_NAME
              value: clay_auth
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: clay-secrets
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clay-secrets
                  key: db-password
            - name: KAFKA_BROKERS
              value: kafka:9092
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: clay-secrets
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: clay-auth-service
  namespace: clay
spec:
  ports:
    - port: 8080
  selector:
    app: clay-auth-service

