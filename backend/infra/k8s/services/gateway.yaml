---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clay-gateway
  namespace: clay
  labels:
    app: clay-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clay-gateway
  template:
    metadata:
      labels:
        app: clay-gateway
    spec:
      containers:
        - name: clay-gateway
          image: clay/clay-gateway:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: REDIS_ADDR
              value: redis-gateway:6379
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: clay-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: clay-gateway
  namespace: clay
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: clay-gateway
