version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Clay Platform — Local Development Docker Compose
# Run: docker-compose up -d
# Stop: docker-compose down -v
# ─────────────────────────────────────────────────────────────────────────────

networks:
  clay-net:
    driver: bridge

# ─────────────────────────────────────────────────────────────────────────────
# INFRASTRUCTURE LAYER
# ─────────────────────────────────────────────────────────────────────────────
services:

  # ─── Kafka ──────────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: clay-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks: [clay-net]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: clay-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks: [clay-net]
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: clay-kafka-ui
    depends_on: [kafka]
    ports:
      - "9000:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: clay-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks: [clay-net]

  # ─── Elasticsearch ───────────────────────────────────────────────────────────
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: clay-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    networks: [clay-net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─── Gateway Redis ──────────────────────────────────────────────────────────
  redis-gateway:
    image: redis:7-alpine
    container_name: clay-redis-gateway
    ports:
      - "6370:6379"
    networks: [clay-net]

  # ─────────────────────────────────────────────────────────────────────────────
  # API GATEWAY
  # ─────────────────────────────────────────────────────────────────────────────
  clay-gateway:
    build:
      context: ../clay-gateway
      dockerfile: Dockerfile
    container_name: clay-gateway
    depends_on: [kafka, redis-gateway]
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      REDIS_ADDR: redis-gateway:6379
      ROUTES_FILE: config/routes.yaml
      JWT_SECRET: ${JWT_SECRET:-clay-super-secret-key}
    networks: [clay-net]

  # ─────────────────────────────────────────────────────────────────────────────
  # AUTH SERVICE  (8001)
  # ─────────────────────────────────────────────────────────────────────────────
  postgres-auth:
    image: postgres:16-alpine
    container_name: clay-postgres-auth
    environment:
      POSTGRES_DB: clay_auth
      POSTGRES_USER: clay
      POSTGRES_PASSWORD: clay
    ports:
      - "5431:5432"
    networks: [clay-net]
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data

  redis-auth:
    image: redis:7-alpine
    container_name: clay-redis-auth
