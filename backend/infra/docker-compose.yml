    environment:
      PORT: "8080"
      DB_HOST: postgres-auth
      DB_PORT: "5432"
      DB_NAME: clay_auth
      DB_USER: clay
      DB_PASSWORD: clay
      REDIS_HOST: redis-auth
      REDIS_PORT: "6379"
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-clay-super-secret-key}
    networks: [clay-net]

  adminer-auth:
    image: adminer
