version: '3.8'

services:
  postgres-ride-order:
    image: postgres:15-alpine
    container_name: clay_ride_order_postgres
    environment:
      POSTGRES_USER: clay_user
      POSTGRES_PASSWORD: clay_password
      POSTGRES_DB: ride_order_db
    ports:
      - "5446:5432"
    volumes:
      - postgres_ride_order_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U clay_user -d ride_order_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-ride-order:
    image: redis:7-alpine
    container_name: clay_ride_order_redis
    ports:
      - "6386:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer
    container_name: clay_ride_order_adminer
    restart: always
    ports:
      - "9016:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres-ride-order

volumes:
  postgres_ride_order_data:
