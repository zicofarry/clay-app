version: '3.8'

services:
  postgres-payment:
    image: postgres:15-alpine
    container_name: clay_payment_postgres
    environment:
      POSTGRES_USER: clay_user
      POSTGRES_PASSWORD: clay_password
      POSTGRES_DB: payment_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_payment_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U clay_user -d payment_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-payment:
    image: redis:7-alpine
    container_name: clay_payment_redis
    ports:
      - "6380:6379"

  adminer:
    image: adminer
    container_name: clay_payment_adminer
    restart: always
    ports:
      - "8081:8080"

volumes:
  postgres_payment_data:
