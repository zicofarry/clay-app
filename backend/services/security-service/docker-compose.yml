version: '3.8'

services:
  postgres-security:
    image: postgres:15-alpine
    container_name: clay_security_postgres
    environment:
      POSTGRES_USER: clay_user
      POSTGRES_PASSWORD: clay_password
      POSTGRES_DB: security_db
    ports:
      - "5450:5432"
    volumes:
      - postgres_security_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U clay_user -d security_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-security:
    image: redis:7-alpine
    container_name: clay_security_redis
    ports:
      - "6390:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer
    container_name: clay_security_adminer
    restart: always
    ports:
      - "9020:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres-security

volumes:
  postgres_security_data:
