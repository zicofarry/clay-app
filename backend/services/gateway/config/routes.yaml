# Clay API Gateway — Route Table
# ─────────────────────────────────────────────────────────────────────────────
# Format per route:
#   path:         URL path (supports {param} wildcards)
#   methods:      allowed HTTP methods
#   upstream:     target service host:port
#   auth:         none | required | "required_roles:[role1,role2]"
#   rate_limit:   requests per minute (0 = unlimited)
#   strip_prefix: prefix to strip before forwarding (optional)
#
# Auth behaviour:
#   none           → no JWT required (public endpoint)
#   required       → valid JWT required, any role
#   required_roles → valid JWT required, must match one of listed roles
#
# After JWT validation, gateway injects:
#   X-User-ID    → user_id from JWT claims
#   X-User-Role  → role from JWT claims
# ─────────────────────────────────────────────────────────────────────────────

# ══════════════════════════════════════════════════════════════════════════════
# AUTH SERVICE
# Upstream: clay-auth-service:8080
# ══════════════════════════════════════════════════════════════════════════════
