  rate_limit: 5

- path: /auth/password/reset
  methods: [POST]
  upstream: clay-auth-service:8080
  auth: none
  rate_limit: 10

- path: /auth/password/change
  methods: [PUT]
  upstream: clay-auth-service:8080
