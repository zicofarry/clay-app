  upstream: clay-auth-service:8080
  auth: none
  rate_limit: 60

- path: /auth/logout
  methods: [POST]
  upstream: clay-auth-service:8080
  auth: required
  rate_limit: 60

- path: /auth/logout-all
  methods: [POST]
  upstream: clay-auth-service:8080
  auth: required
  rate_limit: 10

- path: /auth/sessions
  methods: [GET]
  upstream: clay-auth-service:8080
  auth: required
  rate_limit: 60

- path: /auth/sessions/revoke-all
  methods: [POST]
  upstream: clay-auth-service:8080
  auth: required
  rate_limit: 10

- path: /auth/sessions/{sessionId}
