version: '3.8'

services:
  postgres-delivery-order:
    image: postgres:15-alpine
    container_name: clay_delivery_order_postgres
    environment:
      POSTGRES_USER: clay_user
      POSTGRES_PASSWORD: clay_password
      POSTGRES_DB: delivery_order_db
    ports:
      - "5448:5432"
    volumes:
      - postgres_delivery_order_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U clay_user -d delivery_order_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis-delivery-order:
    image: redis:7-alpine
    container_name: clay_delivery_order_redis
    ports:
      - "6388:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer
    container_name: clay_delivery_order_adminer
    restart: always
    ports:
      - "9018:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres-delivery-order

volumes:
  postgres_delivery_order_data:
