
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0}
.service-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.25rem}
.stab{font-size:12px;padding:5px 10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);cursor:pointer;background:var(--color-background-primary);color:var(--color-text-secondary);transition:all .15s}
.stab.active{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info);font-weight:500}
.service-content{display:none}
.service-content.active{display:block}
.service-header{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.service-title{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.db-badge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500}
.db-pg{background:#E6F1FB;color:#0C447C}
.db-redis{background:#FAECE7;color:#993C1D}
.db-mongo{background:#EAF3DE;color:#3B6D11}
.db-es{background:#FAEEDA;color:#854F0B}
.tables-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.table-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.table-head{padding:10px 14px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;gap:8px}
.table-name{font-size:13px;font-weight:500;color:var(--color-text-primary);font-family:var(--font-mono)}
.table-type-badge{font-size:10px;padding:2px 6px;border-radius:10px;margin-left:auto}
.type-table{background:#EEEDFE;color:#3C3489}
.type-collection{background:#EAF3DE;color:#3B6D11}
.type-hash{background:#FAECE7;color:#993C1D}
.type-geo{background:#FAEEDA;color:#854F0B}
.type-index{background:#FAEEDA;color:#854F0B}
.fields-list{padding:8px 0}
.field-row{display:flex;align-items:center;gap:8px;padding:4px 14px;font-size:12px}
.field-row:hover{background:var(--color-background-secondary)}
.field-name{font-family:var(--font-mono);color:var(--color-text-primary);min-width:130px;font-size:11.5px}
.field-type{color:var(--color-text-info);font-size:11px;font-family:var(--font-mono)}
.field-flag{margin-left:auto;display:flex;gap:4px}
.flag{font-size:9px;padding:1px 5px;border-radius:8px;font-weight:500}
.flag-pk{background:#EEEDFE;color:#3C3489}
.flag-fk{background:#E6F1FB;color:#185FA5}
.flag-idx{background:#EAF3DE;color:#3B6D11}
.flag-uniq{background:#FAEEDA;color:#854F0B}
.flag-nn{background:#F1EFE8;color:#5F5E5A}
.section-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.5px;padding:6px 14px 2px;border-top:0.5px solid var(--color-border-tertiary);margin-top:4px}
.index-row{display:flex;align-items:center;gap:6px;padding:3px 14px;font-size:11px;color:var(--color-text-secondary)}
.index-row span{font-family:var(--font-mono);color:var(--color-text-primary);font-size:11px}
.note-box{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 14px;font-size:12px;color:var(--color-text-secondary);margin-top:12px;border-left:2px solid var(--color-border-info)}
</style>
<div class="wrap">
  <div class="service-tabs" id="tabs"></div>
  <div id="contents"></div>
</div>
<script>
const services=[
{id:"identity",name:"Identity & Profile",dbs:["PostgreSQL","Redis"],
tables:[
{name:"users",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"email",t:"VARCHAR(255)",flags:["UNIQ","IDX"]},
{n:"phone",t:"VARCHAR(20)",flags:["UNIQ","IDX"]},
{n:"password_hash",t:"TEXT",flags:["NN"]},
{n:"full_name",t:"VARCHAR(100)",flags:["NN"]},
{n:"profile_picture_url",t:"TEXT",flags:[]},
{n:"role",t:"ENUM(user,driver,merchant)",flags:["IDX"]},
{n:"status",t:"ENUM(active,suspended,pending)",flags:["IDX"]},
{n:"created_at",t:"TIMESTAMP",flags:[]},
{n:"updated_at",t:"TIMESTAMP",flags:[]}
],indexes:["email","phone","role,status"]},
{name:"drivers",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"user_id",t:"UUID",flags:["FK→users","UNIQ"]},
{n:"vehicle_type",t:"ENUM(motor,car,truck)",flags:["IDX"]},
{n:"plate_number",t:"VARCHAR(20)",flags:["UNIQ"]},
{n:"sim_number",t:"VARCHAR(30)",flags:["UNIQ"]},
{n:"ktp_number",t:"VARCHAR(30)",flags:["UNIQ"]},
{n:"verification_status",t:"ENUM(pending,verified,rejected)",flags:["IDX"]},
{n:"rating_avg",t:"DECIMAL(3,2)",flags:[]},
{n:"is_online",t:"BOOLEAN",flags:["IDX"]}
],indexes:["user_id","vehicle_type","verification_status"]},
{name:"user_sessions",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"user_id",t:"UUID",flags:["FK→users","IDX"]},
{n:"token_hash",t:"TEXT",flags:["UNIQ"]},
{n:"device_info",t:"JSONB",flags:[]},
{n:"ip_address",t:"INET",flags:[]},
{n:"expires_at",t:"TIMESTAMP",flags:["IDX"]},
{n:"created_at",t:"TIMESTAMP",flags:[]}
],indexes:["user_id","expires_at"]},
{name:"session:{token}",type:"hash",fields:[
{n:"user_id",t:"string",flags:[]},
{n:"role",t:"string",flags:[]},
{n:"expires_at",t:"unix_ts",flags:[]},
],indexes:["TTL = session expiry"]},
{name:"otp:{phone}",type:"hash",fields:[
{n:"code_hash",t:"string",flags:[]},
{n:"attempts",t:"integer",flags:[]},
{n:"type",t:"login|register|verify",flags:[]},
],indexes:["TTL = 5 minutes"]},
],
note:"Redis digunakan untuk session cache & OTP ephemeral. PostgreSQL untuk persistent user/driver data."},

{id:"booking",name:"Booking",dbs:["PostgreSQL"],
tables:[
{name:"orders",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"user_id",t:"UUID",flags:["FK→users","IDX"]},
{n:"driver_id",t:"UUID",flags:["FK→drivers","IDX"]},
{n:"service_type",t:"ENUM(goride,gocar,gofood,gosend)",flags:["IDX"]},
{n:"status",t:"ENUM(pending,finding_driver,on_trip,completed,cancelled)",flags:["IDX"]},
{n:"origin_lat",t:"DECIMAL(10,7)",flags:["NN"]},
{n:"origin_lng",t:"DECIMAL(10,7)",flags:["NN"]},
{n:"origin_address",t:"TEXT",flags:[]},
{n:"dest_lat",t:"DECIMAL(10,7)",flags:["NN"]},
{n:"dest_lng",t:"DECIMAL(10,7)",flags:["NN"]},
{n:"dest_address",t:"TEXT",flags:[]},
{n:"fare_estimate",t:"DECIMAL(12,2)",flags:[]},
{n:"fare_final",t:"DECIMAL(12,2)",flags:[]},
{n:"promo_id",t:"UUID",flags:["FK→promo_codes"]},
{n:"otp_code",t:"VARCHAR(6)",flags:[]},
{n:"created_at",t:"TIMESTAMP",flags:["IDX"]},
{n:"updated_at",t:"TIMESTAMP",flags:[]}
],indexes:["user_id","driver_id","status","created_at DESC"]},
{name:"order_state_logs",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"order_id",t:"UUID",flags:["FK→orders","IDX"]},
{n:"from_state",t:"VARCHAR(30)",flags:[]},
{n:"to_state",t:"VARCHAR(30)",flags:[]},
{n:"actor_id",t:"UUID",flags:[]},
{n:"reason",t:"TEXT",flags:[]},
{n:"changed_at",t:"TIMESTAMP",flags:["IDX"]}
],indexes:["order_id","changed_at"]},
{name:"trip_details",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"order_id",t:"UUID",flags:["FK→orders","UNIQ"]},
{n:"polyline",t:"TEXT",flags:[]},
{n:"distance_km",t:"DECIMAL(8,3)",flags:[]},
{n:"duration_minutes",t:"INTEGER",flags:[]},
{n:"pickup_time",t:"TIMESTAMP",flags:[]},
{n:"dropoff_time",t:"TIMESTAMP",flags:[]}
],indexes:["order_id"]}
],
note:"Order state machine dicatat di order_state_logs sebagai audit trail. Satu order punya satu trip_details."},

{id:"dispatcher",name:"Dispatcher",dbs:["Redis"],
tables:[
{name:"drivers:geo",type:"geo",fields:[
{n:"key",t:"drivers:geo",flags:[]},
{n:"member",t:"driver_id (string)",flags:[]},
{n:"score",t:"GeoHash (lng,lat)",flags:[]},
],indexes:["GEORADIUS query untuk cari driver terdekat"]},
{name:"driver:status:{driver_id}",type:"hash",fields:[
{n:"status",t:"available|busy|offline",flags:[]},
{n:"vehicle_type",t:"motor|car|truck",flags:[]},
{n:"order_id",t:"UUID|null",flags:[]},
{n:"updated_at",t:"unix_ts",flags:[]},
],indexes:["TTL = 30 detik (heartbeat)"]},
{name:"driver:broadcast:{order_id}",type:"hash",fields:[
{n:"order_id",t:"string",flags:[]},
{n:"driver_ids",t:"JSON array",flags:[]},
{n:"accepted_by",t:"driver_id|null",flags:[]},
{n:"timeout_at",t:"unix_ts",flags:[]},
],indexes:["TTL = 60 detik (broadcast window)"]},
],
note:"Dispatcher fully stateless pakai Redis. Location update dikirim driver tiap ~5 detik via WebSocket/gRPC stream."},

{id:"payment",name:"Payment & Wallet",dbs:["PostgreSQL"],
tables:[
{name:"wallets",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"owner_id",t:"UUID",flags:["FK→users","IDX"]},
{n:"owner_type",t:"ENUM(user,driver)",flags:["IDX"]},
{n:"balance",t:"DECIMAL(15,2)",flags:["NN"]},
{n:"is_active",t:"BOOLEAN",flags:[]},
{n:"created_at",t:"TIMESTAMP",flags:[]},
{n:"updated_at",t:"TIMESTAMP",flags:[]}
],indexes:["owner_id,owner_type (UNIQUE)"]},
{name:"transactions",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"wallet_id",t:"UUID",flags:["FK→wallets","IDX"]},
{n:"order_id",t:"UUID",flags:["IDX"]},
{n:"type",t:"ENUM(debit,credit,hold,release)",flags:["IDX"]},
{n:"amount",t:"DECIMAL(15,2)",flags:["NN"]},
{n:"balance_before",t:"DECIMAL(15,2)",flags:[]},
{n:"balance_after",t:"DECIMAL(15,2)",flags:[]},
{n:"status",t:"ENUM(pending,success,failed)",flags:["IDX"]},
{n:"description",t:"TEXT",flags:[]},
{n:"created_at",t:"TIMESTAMP",flags:["IDX"]}
],indexes:["wallet_id","order_id","created_at DESC"]},
{name:"payment_holds",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"order_id",t:"UUID",flags:["FK→orders","UNIQ"]},
{n:"wallet_id",t:"UUID",flags:["FK→wallets","IDX"]},
{n:"amount",t:"DECIMAL(15,2)",flags:["NN"]},
{n:"status",t:"ENUM(active,captured,released)",flags:["IDX"]},
{n:"created_at",t:"TIMESTAMP",flags:[]},
{n:"settled_at",t:"TIMESTAMP",flags:[]}
],indexes:["order_id","status"]},
{name:"settlements",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"order_id",t:"UUID",flags:["FK→orders","IDX"]},
{n:"driver_wallet_id",t:"UUID",flags:["FK→wallets"]},
{n:"gross_amount",t:"DECIMAL(15,2)",flags:[]},
{n:"platform_fee",t:"DECIMAL(15,2)",flags:[]},
{n:"net_amount",t:"DECIMAL(15,2)",flags:[]},
{n:"status",t:"ENUM(pending,completed)",flags:["IDX"]},
{n:"settled_at",t:"TIMESTAMP",flags:[]}
],indexes:["order_id","status"]}
],
note:"ACID critical. Semua mutasi saldo harus dalam DB transaction. Gunakan SELECT FOR UPDATE saat update balance."},

{id:"maps",name:"Maps & Routing",dbs:["Redis"],
tables:[
{name:"route:{origin_hash}:{dest}",type:"hash",fields:[
{n:"polyline",t:"encoded string",flags:[]},
{n:"distance_km",t:"float",flags:[]},
{n:"duration_minutes",t:"integer",flags:[]},
{n:"fare_estimate",t:"float",flags:[]},
],indexes:["TTL = 5 menit"]},
{name:"eta:{driver_id}:{order_id}",type:"hash",fields:[
{n:"eta_seconds",t:"integer",flags:[]},
{n:"distance_remaining",t:"float",flags:[]},
{n:"updated_at",t:"unix_ts",flags:[]},
],indexes:["TTL = 30 detik (live update)"]},
],
note:"Service ini mostly stateless — proxy ke Google Maps API. Redis hanya untuk cache hasil supaya tidak kena rate limit & hemat cost."},

{id:"merchant",name:"Merchant & Catalog",dbs:["PostgreSQL","MongoDB"],
tables:[
{name:"merchants",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"owner_id",t:"UUID",flags:["FK→users","IDX"]},
{n:"name",t:"VARCHAR(100)",flags:["IDX"]},
{n:"slug",t:"VARCHAR(100)",flags:["UNIQ"]},
{n:"address",t:"TEXT",flags:[]},
{n:"lat",t:"DECIMAL(10,7)",flags:[]},
{n:"lng",t:"DECIMAL(10,7)",flags:[]},
{n:"category",t:"VARCHAR(50)",flags:["IDX"]},
{n:"rating_avg",t:"DECIMAL(3,2)",flags:[]},
{n:"status",t:"ENUM(active,closed,suspended)",flags:["IDX"]},
{n:"created_at",t:"TIMESTAMP",flags:[]}
],indexes:["owner_id","category","status","(lat,lng) spatial"]},
{name:"operating_hours",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"merchant_id",t:"UUID",flags:["FK→merchants","IDX"]},
{n:"day_of_week",t:"SMALLINT (0-6)",flags:[]},
{n:"open_time",t:"TIME",flags:[]},
{n:"close_time",t:"TIME",flags:[]},
{n:"is_closed",t:"BOOLEAN",flags:[]}
],indexes:["merchant_id"]},
{name:"menu_items",type:"collection",fields:[
{n:"_id",t:"ObjectId",flags:["PK"]},
{n:"merchant_id",t:"UUID",flags:["IDX"]},
{n:"category_name",t:"string",flags:[]},
{n:"name",t:"string",flags:["IDX"]},
{n:"description",t:"string",flags:[]},
{n:"price",t:"number",flags:[]},
{n:"images",t:"string[]",flags:[]},
{n:"tags",t:"string[]",flags:["IDX"]},
{n:"variants",t:"[{name,price}]",flags:[]},
{n:"is_available",t:"boolean",flags:["IDX"]},
{n:"stock_count",t:"number|null",flags:[]}
],indexes:["merchant_id","is_available","text(name,tags)"]}
],
note:"PostgreSQL untuk data merchant yang relasional. MongoDB untuk menu/catalog yang schema-nya fleksibel (variants, toppings, dll)."},

{id:"chat",name:"Chat",dbs:["MongoDB"],
tables:[
{name:"chat_rooms",type:"collection",fields:[
{n:"_id",t:"ObjectId",flags:["PK"]},
{n:"order_id",t:"UUID",flags:["UNIQ","IDX"]},
{n:"user_id",t:"UUID",flags:["IDX"]},
{n:"driver_id",t:"UUID",flags:["IDX"]},
{n:"status",t:"active|closed",flags:["IDX"]},
{n:"created_at",t:"Date",flags:[]},
{n:"closed_at",t:"Date|null",flags:[]}
],indexes:["order_id","user_id","driver_id"]},
{name:"messages",type:"collection",fields:[
{n:"_id",t:"ObjectId",flags:["PK"]},
{n:"room_id",t:"ObjectId",flags:["FK→chat_rooms","IDX"]},
{n:"sender_id",t:"UUID",flags:["IDX"]},
{n:"sender_role",t:"user|driver",flags:[]},
{n:"content",t:"string",flags:[]},
{n:"type",t:"text|image|location",flags:[]},
{n:"is_read",t:"boolean",flags:["IDX"]},
{n:"created_at",t:"Date",flags:["IDX"]}
],indexes:["room_id","created_at","is_read"]}
],
note:"MongoDB ideal karena messages bersifat append-only. Room dibuka saat Order_Created dan ditutup saat Trip_Completed via Kafka consumer."},

{id:"notification",name:"Notification",dbs:["PostgreSQL"],
tables:[
{name:"device_tokens",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"user_id",t:"UUID",flags:["FK→users","IDX"]},
{n:"token",t:"TEXT",flags:["UNIQ"]},
{n:"platform",t:"ENUM(ios,android,web)",flags:[]},
{n:"is_active",t:"BOOLEAN",flags:["IDX"]},
{n:"updated_at",t:"TIMESTAMP",flags:[]}
],indexes:["user_id","is_active"]},
{name:"notification_logs",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"recipient_id",t:"UUID",flags:["IDX"]},
{n:"event_type",t:"VARCHAR(50)",flags:["IDX"]},
{n:"channel",t:"ENUM(fcm,sms,email)",flags:["IDX"]},
{n:"payload",t:"JSONB",flags:[]},
{n:"status",t:"ENUM(sent,failed,pending)",flags:["IDX"]},
{n:"error_message",t:"TEXT",flags:[]},
{n:"sent_at",t:"TIMESTAMP",flags:["IDX"]},
{n:"created_at",t:"TIMESTAMP",flags:[]}
],indexes:["recipient_id","event_type","sent_at DESC"]}
],
note:"Service ini fire-and-forget. Hanya subscribe Kafka events. Tidak ada service lain yang sync call ke sini."},

{id:"promo",name:"Promotion & Voucher",dbs:["PostgreSQL","Redis"],
tables:[
{name:"promo_codes",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"code",t:"VARCHAR(50)",flags:["UNIQ","IDX"]},
{n:"type",t:"ENUM(percentage,fixed)",flags:[]},
{n:"value",t:"DECIMAL(10,2)",flags:["NN"]},
{n:"min_order_amount",t:"DECIMAL(12,2)",flags:[]},
{n:"max_discount",t:"DECIMAL(12,2)",flags:[]},
{n:"valid_from",t:"TIMESTAMP",flags:["IDX"]},
{n:"valid_until",t:"TIMESTAMP",flags:["IDX"]},
{n:"quota",t:"INTEGER",flags:[]},
{n:"used_count",t:"INTEGER",flags:[]},
{n:"service_type",t:"VARCHAR(20)|null",flags:[]},
{n:"is_active",t:"BOOLEAN",flags:["IDX"]}
],indexes:["code","is_active","valid_until"]},
{name:"voucher_usages",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"promo_id",t:"UUID",flags:["FK→promo_codes","IDX"]},
{n:"user_id",t:"UUID",flags:["FK→users","IDX"]},
{n:"order_id",t:"UUID",flags:["UNIQ"]},
{n:"discount_amount",t:"DECIMAL(12,2)",flags:[]},
{n:"used_at",t:"TIMESTAMP",flags:[]}
],indexes:["promo_id,user_id (UNIQUE per user per promo)","order_id"]},
{name:"promo:{code}",type:"hash",fields:[
{n:"id",t:"UUID",flags:[]},
{n:"type",t:"percentage|fixed",flags:[]},
{n:"value",t:"float",flags:[]},
{n:"min_order",t:"float",flags:[]},
{n:"max_discount",t:"float",flags:[]},
],indexes:["TTL = sampai valid_until"]}
],
note:"Redis cache promo aktif supaya validasi promo saat checkout tidak hit PostgreSQL tiap request."},

{id:"rating",name:"Rating & Review",dbs:["PostgreSQL"],
tables:[
{name:"ratings",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"order_id",t:"UUID",flags:["FK→orders","IDX"]},
{n:"rater_id",t:"UUID",flags:["FK→users","IDX"]},
{n:"ratee_id",t:"UUID",flags:["IDX"]},
{n:"ratee_type",t:"ENUM(user,driver)",flags:["IDX"]},
{n:"score",t:"SMALLINT (1-5)",flags:["NN"]},
{n:"comment",t:"TEXT",flags:[]},
{n:"created_at",t:"TIMESTAMP",flags:["IDX"]}
],indexes:["order_id","ratee_id,ratee_type","rater_id"]},
{name:"driver_scores",type:"table",fields:[
{n:"id",t:"UUID",flags:["PK"]},
{n:"driver_id",t:"UUID",flags:["FK→drivers","UNIQ"]},
{n:"avg_score",t:"DECIMAL(3,2)",flags:[]},
{n:"total_ratings",t:"INTEGER",flags:[]},
{n:"last_30d_avg",t:"DECIMAL(3,2)",flags:[]},
{n:"updated_at",t:"TIMESTAMP",flags:[]}
],indexes:["driver_id"]}
],
note:"driver_scores adalah materialized aggregate dari ratings. Di-update tiap ada Trip_Completed event. Dibaca Dispatcher untuk prioritas matching."},

{id:"search",name:"Search",dbs:["Elasticsearch"],
tables:[
{name:"merchants",type:"index",fields:[
{n:"id",t:"keyword",flags:[]},
{n:"name",t:"text (analyzed)",flags:["IDX"]},
{n:"category",t:"keyword",flags:["IDX"]},
{n:"location",t:"geo_point",flags:["IDX"]},
{n:"rating",t:"float",flags:[]},
{n:"tags",t:"keyword[]",flags:["IDX"]},
{n:"is_active",t:"boolean",flags:["IDX"]},
{n:"cuisine_types",t:"keyword[]",flags:["IDX"]}
],indexes:["text(name)","geo_distance(location)","term(category,tags)"]},
{name:"menu_items",type:"index",fields:[
{n:"id",t:"keyword",flags:[]},
{n:"merchant_id",t:"keyword",flags:["IDX"]},
{n:"merchant_name",t:"text",flags:[]},
{n:"name",t:"text (analyzed)",flags:["IDX"]},
{n:"description",t:"text",flags:[]},
{n:"price",t:"float",flags:[]},
{n:"tags",t:"keyword[]",flags:["IDX"]},
{n:"cuisine_type",t:"keyword",flags:["IDX"]},
{n:"is_available",t:"boolean",flags:["IDX"]}
],indexes:["text(name,description)","term(tags,cuisine_type)","range(price)"]}
],
note:"Index di-sync dari Merchant & Catalog Service via Kafka consumer. Elasticsearch dipilih untuk full-text search, geo search, dan faceted filtering."}
];

const tabsEl=document.getElementById('tabs');
const contentsEl=document.getElementById('contents');

const dbColors={PostgreSQL:'db-pg',Redis:'db-redis',MongoDB:'db-mongo',Elasticsearch:'db-es'};
const typeLabels={table:'TABLE',collection:'COLLECTION',hash:'REDIS HASH',geo:'REDIS GEO',index:'ES INDEX'};
const typeBadge={table:'type-table',collection:'type-collection',hash:'type-hash',geo:'type-geo',index:'type-index'};
const flagStyles={PK:'flag-pk',FK:'flag-fk',IDX:'flag-idx',UNIQ:'flag-uniq',NN:'flag-nn'};
const flagLabels={PK:'PK','FK':'FK',IDX:'IDX',UNIQ:'UNQ',NN:'NN'};

function parseFlag(f){
  if(f.startsWith('FK'))return{key:'FK',label:'FK'};
  return{key:f,label:flagLabels[f]||f};
}

services.forEach((svc,i)=>{
  const tab=document.createElement('button');
  tab.className='stab'+(i===0?' active':'');
  tab.textContent=svc.name;
  tab.onclick=()=>{
    document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.service-content').forEach(c=>c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('content-'+svc.id).classList.add('active');
  };
  tabsEl.appendChild(tab);

  const div=document.createElement('div');
  div.className='service-content'+(i===0?' active':'');
  div.id='content-'+svc.id;

  const header=`<div class="service-header">
    <span class="service-title">${svc.name} Service</span>
    ${svc.dbs.map(d=>`<span class="db-badge ${dbColors[d]}">${d}</span>`).join('')}
  </div>`;

  const tables=svc.tables.map(tbl=>{
    const fields=tbl.fields.map(f=>{
      const flags=f.flags.map(fl=>{
        const p=parseFlag(fl);
        return`<span class="flag ${flagStyles[p.key]||'flag-nn'}">${p.label}</span>`;
      }).join('');
      return`<div class="field-row"><span class="field-name">${f.n}</span><span class="field-type">${f.t}</span>${flags?`<span class="field-flag">${flags}</span>`:''}</div>`;
    }).join('');
    const idxRows=tbl.indexes.map(ix=>`<div class="index-row">IDX <span>${ix}</span></div>`).join('');
    return`<div class="table-card">
      <div class="table-head">
        <span class="table-name">${tbl.name}</span>
        <span class="table-type-badge ${typeBadge[tbl.type]}">${typeLabels[tbl.type]}</span>
      </div>
      <div class="fields-list">${fields}</div>
      ${idxRows?`<div class="section-label">Indexes</div>${idxRows}`:''}
    </div>`;
  }).join('');

  div.innerHTML=header+`<div class="tables-grid">${tables}</div>`+
    (svc.note?`<div class="note-box">${svc.note}</div>`:'');
  contentsEl.appendChild(div);
});
</script>
